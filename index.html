<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slide Maker 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    .loader{border:4px solid #f3f3f3;border-top:4px solid #4f46e5;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .view-container{transition:opacity .3s ease,transform .3s ease}
    .view-container.hidden{display:none}
    #notification-banner{transition:transform .3s ease,opacity .3s ease}
    #notification-banner.hidden{transform:translateY(-100%);opacity:0}
    .sortable-item.dragging{opacity:.5}
    .sortable-item.drop-target{outline:2px dashed #4f46e5}
    
    /* アスペクト比 4:3 の維持 */
    .aspect-4-3{position:relative;width:100%;padding-top:75%;}
    .aspect-4-3>.aspect-content{position:absolute;inset:0}
    
    .slide-shell{width:100%;max-width:800px;margin:0 auto;position:relative}
    .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:2rem;color:#9ca3af;cursor:pointer;user-select:none;z-index:10}
    .nav-arrow:hover{color:#4f46e5}.nav-arrow.left{left:-2.5rem}.nav-arrow.right{right:-2.5rem}
    
    /* キャプチャ用の一時レイヤー */
    #capture-area {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 1024px;
      height: 768px;
      background: white;
      z-index: -1;
    }

    #image-drop-zone.dragover { border-color: #4f46e5; background-color: #eef2ff; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- 通知バナー -->
  <div id="notification-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 w-full max-w-md p-4 z-50 rounded-lg shadow-xl text-center font-medium">
    <p id="notification-message"></p>
  </div>

  <!-- 確認モーダル -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm mx-4">
      <p id="confirm-message" class="text-gray-800 mb-6 text-center">実行しますか？</p>
      <div class="flex justify-center gap-3">
        <button id="confirm-cancel-btn" class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">キャンセル</button>
        <button id="confirm-ok-btn" class="px-5 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">OK</button>
      </div>
    </div>
  </div>

  <!-- グローバルローダー -->
  <div id="global-loader" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[100]">
      <div class="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4">
          <div class="loader"></div>
          <p id="global-loader-text" class="text-gray-700 font-bold">処理中...</p>
      </div>
  </div>

  <!-- PDFキャプチャ用隠しエリア -->
  <div id="capture-area"></div>

  <div class="max-w-6xl mx-auto p-4 sm:p-8">
    <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="text-3xl font-black text-indigo-700 tracking-tight">Slide Maker 2</h1>
        <p class="text-gray-500 font-medium text-sm">文章からスライドを生成・編集・保存</p>
      </div>
      <nav class="flex bg-gray-200/50 p-1 rounded-xl space-x-1" aria-label="Tabs">
        <button id="tab-editor" class="flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition bg-white text-indigo-600 shadow-sm">作成・編集</button>
        <button id="tab-viewer" class="flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition text-gray-500 hover:text-gray-700">閲覧モード</button>
      </nav>
    </header>

    <main>
      <!-- エディタ表示 -->
      <div id="editor-view" class="view-container">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          <!-- 左カラム：設定とリスト -->
          <div class="lg:col-span-4 space-y-6">
            <!-- 1. GPTs連携 -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="bg-indigo-100 text-indigo-600 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                スライドデータを作成
              </h2>
              <p class="text-xs text-gray-500 mb-3">まずはAIを使って、スライド用のJSONデータを作成しましょう。</p>
              <a href="https://chatgpt.com/g/g-68e79a810ad48191b8433cf72d5ea89b-2ze-json" target="_blank" class="flex items-center justify-center gap-2 w-full bg-white border-2 border-indigo-600 text-indigo-600 font-bold py-3 px-4 rounded-xl hover:bg-indigo-50 transition shadow-sm text-sm">
                テキストをJSON化するGPTs
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
              </a>
            </section>

            <!-- 2. インポート -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="bg-indigo-100 text-indigo-600 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                データの読み込み
              </h2>
              <textarea id="json-input" rows="4" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 transition text-sm outline-none" placeholder='GPTsから出力されたJSONをここに貼り付けてください...'></textarea>
              <button id="import-json-btn" class="mt-3 w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">インポート実行</button>
            </section>

            <!-- 3. 保存・書き出し -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="bg-indigo-100 text-indigo-600 w-6 h-6 rounded-full flex items-center justify-center text-xs">3</span>
                保存・書き出し
              </h2>
              <input type="text" id="slide-name" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl mb-3 text-sm font-bold" placeholder="スライド名を入力">
              <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="save-slides-btn" class="bg-emerald-500 text-white font-bold py-2 rounded-xl hover:bg-emerald-600 transition">ブラウザ保存</button>
                <button id="export-json-btn" class="bg-gray-100 text-gray-600 font-bold py-2 rounded-xl hover:bg-gray-200 transition">JSONコピー</button>
              </div>
              
              <div class="space-y-2 pt-4 border-t border-gray-100">
                <button id="export-pdf-btn" class="w-full py-2.5 rounded-xl border-2 border-red-500 text-red-600 font-bold hover:bg-red-50 transition flex items-center justify-center gap-2 text-sm">
                   PDFで書き出す
                </button>
                <button id="export-pptx-btn" class="w-full py-2.5 rounded-xl border-2 border-orange-500 text-orange-600 font-bold hover:bg-orange-50 transition flex items-center justify-center gap-2 text-sm">
                   PowerPointで保存
                </button>
              </div>
            </section>

            <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
              <h3 class="font-bold text-sm text-gray-500 mb-3 px-2">管理</h3>
              <select id="saved-files-select" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl mb-2 text-sm outline-none">
                <option value="">保存済みスライドを選択...</option>
              </select>
              <div class="flex gap-2">
                <button id="load-slides-btn" class="flex-1 bg-indigo-50 text-indigo-700 font-bold py-2 rounded-xl text-xs hover:bg-indigo-100 transition">読み込み</button>
                <button id="delete-local-btn" class="flex-1 bg-red-50 text-red-700 font-bold py-2 rounded-xl text-xs hover:bg-red-100 transition">削除</button>
              </div>
            </section>
          </div>

          <!-- 右カラム：プレビューと編集 -->
          <div class="lg:col-span-8 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
              <div class="slide-shell">
                <div id="editor-prev-arrow" class="nav-arrow left">❮</div>
                <div id="editor-next-arrow" class="nav-arrow right">❯</div>
                <div class="aspect-4-3 bg-gray-100 rounded-2xl overflow-hidden shadow-inner border border-gray-200">
                  <div id="editor-slide-container" class="aspect-content"></div>
                </div>
              </div>

              <div class="flex justify-between items-center mt-6">
                <button id="add-slide-btn" class="px-4 py-2 bg-indigo-50 text-indigo-700 font-bold rounded-xl hover:bg-indigo-100 transition text-sm">+ スライド追加</button>
                <div class="text-sm font-bold text-gray-400">
                  <span id="current-slide-num">0</span> / <span id="total-slide-num">0</span>
                </div>
                <button id="remove-slide-btn" class="px-4 py-2 bg-red-50 text-red-700 font-bold rounded-xl hover:bg-red-100 transition text-sm">現在のスライド削除</button>
              </div>

              <div id="slide-edit-form" class="mt-8 pt-8 border-t border-gray-100 space-y-6">
                <div>
                  <label class="block text-sm font-bold text-gray-700 mb-2">文章内容</label>
                  <textarea id="text-content-input" rows="4" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="テキストを入力..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">画像設定（貼り付け対応）</label>
                    <div id="image-drop-zone" class="h-32 border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center bg-gray-50 hover:bg-indigo-50 transition cursor-pointer relative overflow-hidden">
                      <p class="text-xs text-gray-400 font-medium text-center px-4">画像をドロップ・クリック<br>またはどこでも貼り付け(Ctrl+V)</p>
                      <input type="file" id="file-upload" class="hidden" accept="image/*">
                      <input type="hidden" id="image-url-input">
                      <div id="image-loading-overlay" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center"><div class="loader"></div></div>
                    </div>
                    <div id="current-image-preview" class="hidden mt-2 p-2 bg-indigo-50 rounded-xl flex items-center justify-between">
                      <img src="" class="h-10 w-10 object-cover rounded-lg border bg-white">
                      <button id="remove-image-btn" class="text-xs text-red-500 font-bold px-3 py-1 bg-white rounded-lg border shadow-sm">画像削除</button>
                    </div>
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">個別文字サイズ (CPL)</label>
                    <div class="flex items-center gap-2">
                      <button id="slide-cpl-down" class="w-10 h-10 flex items-center justify-center bg-white border border-gray-200 rounded-xl hover:bg-gray-50">ー</button>
                      <span id="slide-cpl-display" class="font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">—</span>
                      <button id="slide-cpl-up" class="w-10 h-10 flex items-center justify-center bg-white border border-gray-200 rounded-xl hover:bg-gray-50">＋</button>
                      <button id="slide-cpl-reset" class="text-xs text-gray-400 underline ml-2">リセット</button>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-2">※CPL値が小さいほど文字が大きくなります。</p>
                  </div>
                </div>

                <div class="mt-8">
                  <h3 class="text-sm font-bold text-gray-700 mb-3">スライド一覧（ドラッグで移動）</h3>
                  <ul id="reorder-list" class="space-y-2 max-h-60 overflow-y-auto pr-2"></ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ビューアー表示 -->
      <div id="viewer-view" class="view-container hidden">
        <div id="viewer-start-screen" class="max-w-md mx-auto bg-white p-12 rounded-3xl shadow-2xl text-center">
          <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          </div>
          <h2 class="text-2xl font-black mb-2">スライドを閲覧</h2>
          <p class="text-gray-400 mb-8 font-medium text-sm">保存されたリストから選択してください</p>
          <select id="viewer-file-select" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl mb-4 text-sm font-bold outline-none"></select>
          <button id="start-viewer-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">開始する</button>
        </div>

        <div id="viewer-slide-screen" class="hidden">
          <div class="slide-shell">
            <div id="viewer-prev-arrow" class="nav-arrow left">❮</div>
            <div id="viewer-next-arrow" class="nav-arrow right">❯</div>
            <div id="viewer-slide-aspect-container" class="aspect-4-3 bg-white rounded-3xl shadow-2xl border overflow-hidden">
              <div id="viewer-slide-container" class="aspect-content bg-white"></div>
            </div>
          </div>
          <div class="flex justify-center items-center gap-6 mt-8">
            <button id="viewer-back-btn" class="text-sm font-bold text-gray-400 hover:text-indigo-600 transition">リストに戻る</button>
            <div class="px-6 py-2 bg-gray-100 rounded-full text-xs font-black text-gray-500">
               <span id="viewer-num">0</span> / <span id="viewer-total">0</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const CPL_DEFAULT = 25, CPL_MIN = 12, CPL_MAX = 40;
    const STORAGE_KEY = "slide_maker_data_";

    const state = {
      mode: 'editor',
      editor: { slides: [], currentSlideIndex: -1, slideName: '' },
      viewer: { slides: [], currentSlideIndex: -1 },
      globalCpl: 25
    };

    const dom = {
      notificationBanner: document.getElementById('notification-banner'),
      notificationMessage: document.getElementById('notification-message'),
      confirmModal: document.getElementById('confirm-modal'),
      confirmMessage: document.getElementById('confirm-message'),
      confirmOkBtn: document.getElementById('confirm-ok-btn'),
      confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
      globalLoader: document.getElementById('global-loader'),
      globalLoaderText: document.getElementById('global-loader-text'),
      captureArea: document.getElementById('capture-area'),

      tabEditor: document.getElementById('tab-editor'),
      tabViewer: document.getElementById('tab-viewer'),
      editorView: document.getElementById('editor-view'),
      viewerView: document.getElementById('viewer-view'),

      jsonInput: document.getElementById('json-input'),
      importJsonBtn: document.getElementById('import-json-btn'),
      slideNameInput: document.getElementById('slide-name'),
      saveSlidesBtn: document.getElementById('save-slides-btn'),
      loadSlidesBtn: document.getElementById('load-slides-btn'),
      deleteLocalBtn: document.getElementById('delete-local-btn'),
      savedFilesSelect: document.getElementById('saved-files-select'),
      exportPdfBtn: document.getElementById('export-pdf-btn'),
      exportPptxBtn: document.getElementById('export-pptx-btn'),
      exportJsonBtn: document.getElementById('export-json-btn'),

      editorSlideContainer: document.getElementById('editor-slide-container'),
      editorPrevArrow: document.getElementById('editor-prev-arrow'),
      editorNextArrow: document.getElementById('editor-next-arrow'),
      addSlideBtn: document.getElementById('add-slide-btn'),
      removeSlideBtn: document.getElementById('remove-slide-btn'),
      currentSlideNum: document.getElementById('current-slide-num'),
      totalSlideNum: document.getElementById('total-slide-num'),
      
      textContentInput: document.getElementById('text-content-input'),
      imageUrlInput: document.getElementById('image-url-input'),
      fileUploadInput: document.getElementById('file-upload'),
      imageDropZone: document.getElementById('image-drop-zone'),
      imageLoadingOverlay: document.getElementById('image-loading-overlay'),
      currentImagePreview: document.getElementById('current-image-preview'),
      removeImageBtn: document.getElementById('remove-image-btn'),
      slideEditForm: document.getElementById('slide-edit-form'),
      reorderList: document.getElementById('reorder-list'),

      slideCplUp: document.getElementById('slide-cpl-up'),
      slideCplDown: document.getElementById('slide-cpl-down'),
      slideCplReset: document.getElementById('slide-cpl-reset'),
      slideCplDisplay: document.getElementById('slide-cpl-display'),

      viewerFileSelect: document.getElementById('viewer-file-select'),
      startViewerBtn: document.getElementById('start-viewer-btn'),
      viewerSlideScreen: document.getElementById('viewer-slide-screen'),
      viewerStartScreen: document.getElementById('viewer-start-screen'),
      viewerSlideContainer: document.getElementById('viewer-slide-container'),
      viewerSlideAspectContainer: document.getElementById('viewer-slide-aspect-container'),
      viewerPrevArrow: document.getElementById('viewer-prev-arrow'),
      viewerNextArrow: document.getElementById('viewer-next-arrow'),
      viewerBackBtn: document.getElementById('viewer-back-btn'),
      viewerNum: document.getElementById('viewer-num'),
      viewerTotal: document.getElementById('viewer-total')
    };

    // --- Utils ---
    function showNotification(msg, type = 'info') {
      dom.notificationMessage.textContent = msg;
      dom.notificationBanner.className = 'fixed top-4 left-1/2 -translate-x-1/2 w-full max-w-md p-4 z-50 rounded-xl shadow-xl text-center font-bold transition-all duration-300';
      const colors = { success: 'bg-emerald-500 text-white', error: 'bg-red-500 text-white', info: 'bg-indigo-600 text-white' };
      dom.notificationBanner.classList.add(...(colors[type] || colors.info).split(' '));
      dom.notificationBanner.classList.remove('hidden');
      setTimeout(() => dom.notificationBanner.classList.add('hidden'), 3000);
    }

    function showConfirm(msg) {
      return new Promise(resolve => {
        dom.confirmMessage.textContent = msg;
        dom.confirmModal.classList.remove('hidden');
        const end = (v) => { dom.confirmModal.classList.add('hidden'); resolve(v); };
        dom.confirmOkBtn.onclick = () => end(true);
        dom.confirmCancelBtn.onclick = () => end(false);
      });
    }

    function showLoader(txt) { dom.globalLoaderText.textContent = txt; dom.globalLoader.classList.remove('hidden'); }
    function hideLoader() { dom.globalLoader.classList.add('hidden'); }

    // --- Render Logic ---
    function getCpl(slide) { return slide.cpl || state.globalCpl; }

    function autoSizeText(container, slide) {
      const p = container.querySelector('.auto-text');
      if (!p) return;
      const w = container.offsetWidth || 800;
      const cpl = getCpl(slide);
      const fontSize = Math.max(16, Math.min(64, Math.floor(w / cpl)));
      p.style.fontSize = fontSize + 'px';
    }

    function createSlideHTML(slide) {
      const text = (slide.text_content || "").replace(/\n/g, '<br>');
      const img = slide.image_url ? `<div class="flex-grow flex items-center justify-center p-4 min-h-0 overflow-hidden"><img src="${slide.image_url}" class="max-w-full max-h-full object-contain pointer-events-none" style="aspect-ratio: auto;"></div>` : '';
      const textClass = slide.image_url ? "w-full p-6 bg-white shrink-0" : "w-full h-full flex items-center justify-center p-12";
      
      return `
        <div class="w-full h-full flex flex-col bg-white overflow-hidden select-none">
          ${img}
          <div class="${textClass}">
            <p class="auto-text text-center font-bold text-gray-800 leading-snug break-words">${text}</p>
          </div>
        </div>
      `;
    }

    function renderEditor() {
      const { slides, currentSlideIndex } = state.editor;
      dom.totalSlideNum.textContent = slides.length;
      dom.currentSlideNum.textContent = slides.length > 0 ? currentSlideIndex + 1 : 0;

      if (currentSlideIndex === -1) {
        dom.editorSlideContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-300 font-bold">スライドなし</div>`;
        if (dom.slideEditForm) dom.slideEditForm.classList.add('hidden');
      } else {
        const slide = slides[currentSlideIndex];
        dom.editorSlideContainer.innerHTML = createSlideHTML(slide);
        if (dom.slideEditForm) dom.slideEditForm.classList.remove('hidden');
        dom.textContentInput.value = slide.text_content;
        dom.imageUrlInput.value = slide.image_url;
        dom.slideCplDisplay.textContent = slide.cpl || "—";
        
        if (slide.image_url) {
          dom.currentImagePreview.classList.remove('hidden');
          dom.currentImagePreview.querySelector('img').src = slide.image_url;
          dom.imageDropZone.classList.add('hidden');
        } else {
          dom.currentImagePreview.classList.add('hidden');
          dom.imageDropZone.classList.remove('hidden');
        }
        autoSizeText(dom.editorSlideContainer, slide);
      }
      renderReorderList();
    }

    function renderReorderList() {
      dom.reorderList.innerHTML = "";
      state.editor.slides.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = `p-2 rounded-xl flex items-center gap-2 cursor-pointer border transition ${i === state.editor.currentSlideIndex ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-gray-100'}`;
        li.draggable = true;
        li.innerHTML = `
          <span class="text-xs font-bold text-gray-300 w-4">${i+1}</span>
          <div class="flex-grow truncate text-xs font-bold ${i === state.editor.currentSlideIndex ? 'text-indigo-600' : 'text-gray-500'}">${s.text_content || '空のスライド'}</div>
          ${s.image_url ? '<div class="w-2 h-2 rounded-full bg-blue-400"></div>' : ''}
        `;
        li.onclick = () => { state.editor.currentSlideIndex = i; renderEditor(); };
        li.ondragstart = (e) => { li.classList.add('dragging'); e.dataTransfer.setData('text/plain', i); };
        li.ondragend = () => li.classList.remove('dragging');
        li.ondragover = (e) => { e.preventDefault(); li.classList.add('drop-target'); };
        li.ondragleave = () => li.classList.remove('drop-target');
        li.ondrop = (e) => {
          e.preventDefault();
          li.classList.remove('drop-target');
          const from = parseInt(e.dataTransfer.getData('text/plain'));
          const to = i;
          if (from !== to) {
            const item = state.editor.slides.splice(from, 1)[0];
            state.editor.slides.splice(to, 0, item);
            state.editor.currentSlideIndex = to;
            renderEditor();
          }
        };
        dom.reorderList.appendChild(li);
      });
    }

    function renderViewer() {
      const { slides, currentSlideIndex } = state.viewer;
      if (slides.length === 0) {
        dom.viewerStartScreen.classList.remove('hidden');
        dom.viewerSlideScreen.classList.add('hidden');
      } else {
        dom.viewerStartScreen.classList.add('hidden');
        dom.viewerSlideScreen.classList.remove('hidden');
        const slide = slides[currentSlideIndex];
        dom.viewerSlideContainer.innerHTML = createSlideHTML(slide);
        dom.viewerNum.textContent = currentSlideIndex + 1;
        dom.viewerTotal.textContent = slides.length;
        requestAnimationFrame(() => autoSizeText(dom.viewerSlideContainer, slide));
      }
    }

    // --- PDF Export ---
    async function exportPdf() {
      const slides = state.editor.slides;
      if (!slides.length) return showNotification("スライドがありません", "error");
      
      showLoader("PDFを作成中... しばらくお待ちください");
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1024, 768] });
      
      dom.captureArea.style.display = "block";

      try {
        for (let i = 0; i < slides.length; i++) {
          if (i > 0) pdf.addPage([1024, 768], 'landscape');
          
          const slide = slides[i];
          dom.captureArea.innerHTML = createSlideHTML(slide);
          autoSizeText(dom.captureArea, slide);
          
          await new Promise(r => setTimeout(r, 300));

          const canvas = await html2canvas(dom.captureArea, {
            width: 1024,
            height: 768,
            scale: 1,
            useCORS: true,
            allowTaint: true,
            logging: false
          });
          
          const imgData = canvas.toDataURL('image/jpeg', 0.9);
          pdf.addImage(imgData, 'JPEG', 0, 0, 1024, 768);
        }
        pdf.save(`${dom.slideNameInput.value || 'slides'}.pdf`);
        showNotification("PDFを保存しました", "success");
      } catch (err) {
        console.error(err);
        showNotification("PDF生成中にエラーが発生しました", "error");
      } finally {
        dom.captureArea.style.display = "none";
        hideLoader();
      }
    }

    // --- PPTX Export ---
    async function getImageDimensions(dataUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
            img.onerror = () => resolve({ w: 0, h: 0 });
            img.src = dataUrl;
        });
    }

    async function exportPptx() {
      const slides = state.editor.slides;
      if (!slides.length) return showNotification("スライドがありません", "error");
      
      showLoader("PPTXを作成中...");
      try {
        const pptx = new PptxGenJS();
        pptx.layout = 'LAYOUT_4x3';
        
        for (const s of slides) {
          const slide = pptx.addSlide();
          const hasImage = !!s.image_url;
          
          if (hasImage) {
            const dims = await getImageDimensions(s.image_url);
            let imgW = 9.0;
            let imgH = 4.5;
            let imgX = 0.5;
            let imgY = 0.5;

            if (dims.w > 0 && dims.h > 0) {
                const ratio = dims.w / dims.h;
                const targetAreaRatio = 9.0 / 4.5;
                if (ratio > targetAreaRatio) {
                    imgW = 9.0;
                    imgH = 9.0 / ratio;
                } else {
                    imgH = 4.5;
                    imgW = 4.5 * ratio;
                }
                imgX = 0.5 + (9.0 - imgW) / 2;
                imgY = 0.5 + (4.5 - imgH) / 2;
            }

            slide.addImage({ data: s.image_url, x: imgX, y: imgY, w: imgW, h: imgH });

            slide.addText(s.text_content || "", {
              x: 0.5, y: 5.2, w: 9.0, h: 1.8,
              align: 'center', valign: 'middle',
              fontSize: 24, color: '333333', bold: true
            });
          } else {
            slide.addText(s.text_content || "", {
              x: 1.0, y: 1.0, w: 8.0, h: 5.5,
              align: 'center', valign: 'middle',
              fontSize: 32, color: '333333', bold: true
            });
          }
        }

        await pptx.writeFile({ fileName: `${dom.slideNameInput.value || 'slides'}.pptx` });
        showNotification("PPTXを保存しました", "success");
      } catch (err) {
        console.error(err);
        showNotification("PPTX生成中にエラーが発生しました", "error");
      } finally {
        hideLoader();
      }
    }

    // --- Event Handlers ---
    function handleImage(file) {
      if (!file || !file.type.startsWith('image/')) return;
      dom.imageLoadingOverlay.classList.remove('hidden');
      const reader = new FileReader();
      reader.onload = (e) => {
        dom.imageUrlInput.value = e.target.result;
        if (state.editor.currentSlideIndex !== -1) {
            state.editor.slides[state.editor.currentSlideIndex].image_url = e.target.result;
        }
        dom.imageLoadingOverlay.classList.add('hidden');
        renderEditor();
      };
      reader.readAsDataURL(file);
    }

    function setupEvents() {
      window.addEventListener('paste', (e) => {
          if (state.mode !== 'editor' || state.editor.currentSlideIndex === -1) return;
          const items = (e.clipboardData || e.originalEvent.clipboardData).items;
          for (const item of items) {
              if (item.kind === 'file' && item.type.startsWith('image/')) {
                  const file = item.getAsFile();
                  handleImage(file);
                  showNotification("画像を貼り付けました", "success");
                  break;
              }
          }
      });

      dom.tabEditor.onclick = () => { state.mode = 'editor'; dom.tabEditor.className = "flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition bg-white text-indigo-600 shadow-sm"; dom.tabViewer.className = "flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition text-gray-500 hover:text-gray-700"; renderEditor(); dom.editorView.classList.remove('hidden'); dom.viewerView.classList.add('hidden'); };
      dom.tabViewer.onclick = () => { state.mode = 'viewer'; dom.tabViewer.className = "flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition bg-white text-indigo-600 shadow-sm"; dom.tabEditor.className = "flex-1 md:flex-none py-2 px-6 rounded-lg font-bold text-sm transition text-gray-500 hover:text-gray-700"; renderViewer(); dom.viewerView.classList.remove('hidden'); dom.editorView.classList.add('hidden'); updateFileList(); };

      dom.importJsonBtn.onclick = () => {
        try {
          const raw = JSON.parse(dom.jsonInput.value.replace(/,(?=\s*[}\]])/g, ''));
          state.editor.slides = raw.map(s => ({ text_content: s.text_content || s.text || "", image_url: s.image_url || s.image || "", cpl: s.cpl || 0 }));
          state.editor.currentSlideIndex = state.editor.slides.length > 0 ? 0 : -1;
          renderEditor();
          showNotification("インポートしました", "success");
          dom.jsonInput.value = "";
        } catch (e) { showNotification("JSON形式が正しくありません", "error"); }
      };

      dom.textContentInput.oninput = (e) => { if (state.editor.currentSlideIndex === -1) return; state.editor.slides[state.editor.currentSlideIndex].text_content = e.target.value; renderEditor(); };
      dom.editorPrevArrow.onclick = () => { if (state.editor.currentSlideIndex > 0) { state.editor.currentSlideIndex--; renderEditor(); } };
      dom.editorNextArrow.onclick = () => { if (state.editor.currentSlideIndex < state.editor.slides.length - 1) { state.editor.currentSlideIndex++; renderEditor(); } };
      dom.addSlideBtn.onclick = () => { const i = state.editor.currentSlideIndex; state.editor.slides.splice(i + 1, 0, { text_content: "", image_url: "", cpl: 0 }); state.editor.currentSlideIndex = i + 1; renderEditor(); };
      dom.removeSlideBtn.onclick = async () => { if (state.editor.currentSlideIndex === -1) return; if (await showConfirm("このスライドを削除しますか？")) { state.editor.slides.splice(state.editor.currentSlideIndex, 1); state.editor.currentSlideIndex = state.editor.slides.length > 0 ? Math.max(0, state.editor.currentSlideIndex - 1) : -1; renderEditor(); } };

      dom.imageDropZone.onclick = () => dom.fileUploadInput.click();
      dom.fileUploadInput.onchange = (e) => handleImage(e.target.files[0]);
      dom.imageDropZone.ondragover = (e) => { e.preventDefault(); dom.imageDropZone.classList.add('dragover'); };
      dom.imageDropZone.ondragleave = () => dom.imageDropZone.classList.remove('dragover');
      dom.imageDropZone.ondrop = (e) => { e.preventDefault(); dom.imageDropZone.classList.remove('dragover'); handleImage(e.dataTransfer.files[0]); };
      dom.removeImageBtn.onclick = () => { if (state.editor.currentSlideIndex === -1) return; state.editor.slides[state.editor.currentSlideIndex].image_url = ""; renderEditor(); };

      dom.slideCplUp.onclick = () => { const s = state.editor.slides[state.editor.currentSlideIndex]; s.cpl = Math.min(CPL_MAX, (s.cpl || state.globalCpl) + 1); renderEditor(); };
      dom.slideCplDown.onclick = () => { const s = state.editor.slides[state.editor.currentSlideIndex]; s.cpl = Math.max(CPL_MIN, (s.cpl || state.globalCpl) - 1); renderEditor(); };
      dom.slideCplReset.onclick = () => { const s = state.editor.slides[state.editor.currentSlideIndex]; if (s) delete s.cpl; renderEditor(); };

      dom.saveSlidesBtn.onclick = () => {
        const name = dom.slideNameInput.value.trim();
        if (!name) return showNotification("スライド名を入力してください", "error");
        try {
          localStorage.setItem(STORAGE_KEY + name, JSON.stringify({ name, slides: state.editor.slides, updatedAt: Date.now() }));
          showNotification("保存しました", "success");
          updateFileList();
        } catch (e) { showNotification("保存容量制限を超えています。画像を減らしてください", "error"); }
      };
      dom.loadSlidesBtn.onclick = () => {
        const name = dom.savedFilesSelect.value;
        if (!name) return;
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY + name));
        if (data) { state.editor.slides = data.slides; state.editor.currentSlideIndex = 0; dom.slideNameInput.value = data.name; renderEditor(); showNotification("読み込みました"); }
      };
      dom.deleteLocalBtn.onclick = async () => {
        const name = dom.savedFilesSelect.value;
        if (name && await showConfirm(`「${name}」を削除しますか？`)) { localStorage.removeItem(STORAGE_KEY + name); updateFileList(); showNotification("削除しました"); }
      };

      dom.exportPdfBtn.onclick = exportPdf;
      dom.exportPptxBtn.onclick = exportPptx;
      dom.exportJsonBtn.onclick = () => { if (state.editor.slides.length === 0) return; navigator.clipboard.writeText(JSON.stringify(state.editor.slides)); showNotification("JSONをクリップボードにコピーしました"); };

      dom.startViewerBtn.onclick = () => {
        const name = dom.viewerFileSelect.value;
        if (!name) return;
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY + name));
        if (data) { state.viewer.slides = data.slides; state.viewer.currentSlideIndex = 0; renderViewer(); }
      };
      dom.viewerBackBtn.onclick = () => { state.viewer.slides = []; renderViewer(); };
      dom.viewerPrevArrow.onclick = () => { if (state.viewer.currentSlideIndex > 0) { state.viewer.currentSlideIndex--; renderViewer(); } };
      dom.viewerNextArrow.onclick = () => { if (state.viewer.currentSlideIndex < state.viewer.slides.length - 1) { state.viewer.currentSlideIndex++; renderViewer(); } };

      window.onresize = () => { if (state.mode === 'editor') renderEditor(); else renderViewer(); };
    }

    function updateFileList() {
      const keys = Object.keys(localStorage).filter(k => k.startsWith(STORAGE_KEY)).map(k => k.replace(STORAGE_KEY, ''));
      const options = '<option value="">保存済みスライドを選択...</option>' + keys.map(k => `<option value="${k}">${k}</option>`).join('');
      dom.savedFilesSelect.innerHTML = options;
      dom.viewerFileSelect.innerHTML = options;
    }

    setupEvents();
    updateFileList();
    renderEditor();

  </script>
</body>
</html>
